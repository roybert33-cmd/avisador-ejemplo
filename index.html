<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cliente - Avisador</title>
    <link rel="stylesheet" href="diseno.css">
</head>
<body>
    <div class="contenedor" id="contenedor-principal">
        <h1>Retiro de Pedidos</h1>
        
        <div id="pantalla-registro">
            <input type="number" id="numero-cliente-input" placeholder="Tu número de ticket" style="padding:10px; width:80%; border-radius:5px; border:1px solid #ccc;">
            <button class="boton-accion" onclick="activarMiPedido()">🔔 Activar Alertas</button>
        </div>

        <div id="estado-pantalla" style="font-size: 20px; margin-top:20px;">Esperando conexión...</div>
        
        <button id="boton-cerrar" style="display:none; margin-top: 20px; padding: 15px 30px; background-color: #D52B1E; color: white; border: none; border-radius: 5px; font-size: 18px; cursor: pointer;" onclick="window.location.href='about:blank'">Cerrar Página</button>
        
        <video id="video-cueca" class="video-cueca" style="display:none;" loop muted playsinline preload="auto">
            <source src="video.mp4" type="video/mp4">
        </video>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getDatabase, ref, onValue, off, update } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
        import { initializeAppCheck, ReCaptchaV3Provider } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app-check.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB9kLWRc6t7_XNBhlC10a4jmtbCntxOEYo",
            authDomain: "avisador-arayapp.firebaseapp.com",
            databaseURL: "https://avisador-arayapp-default-rtdb.firebaseio.com",
            projectId: "avisador-arayapp",
            storageBucket: "avisador-arayapp.firebasestorage.app",
            messagingSenderId: "337997002279",
            appId: "1:337997002279:web:6dc307a6e474432e64c002"
        };

        const app = initializeApp(firebaseConfig);
        initializeAppCheck(app, { provider: new ReCaptchaV3Provider('6LcPPFEtAAAAAIVtKgVFo1jtAQWRESDHHnCjMKaE'), isTokenAutoRefreshEnabled: true });
        const db = getDatabase(app);
        const auth = getAuth(app);
        let audioCtx = null;
        let intervaloAlarma = null;
        let wakeLock = null;

        const KEY_BLOQUEO = 'arayapp_ticket_bloqueado';
        function verificarBloqueoInicial() {
            const ticketGuardado = localStorage.getItem(KEY_BLOQUEO);
            if(ticketGuardado){
                document.getElementById("pantalla-registro").style.display = "none";
                document.getElementById("estado-pantalla").innerHTML = "<h3 style='color: #D52B1E;'>⏳ Tu pedido #" + ticketGuardado + " ya está en curso.</h3><p>No puedes ingresar otro número hasta que cocina reinicie.</p><button class='boton-accion' style='margin-top:15px;background:#000' onclick='window.activarMiPedido(true)'>🔊 Toca aquí para reactivar sonido</button>";
                return ticketGuardado;
            }
            return null;
        }
        function activarBloqueoTelefono(numero){ localStorage.setItem(KEY_BLOQUEO, numero); }
        function liberarBloqueoTelefono(){ localStorage.removeItem(KEY_BLOQUEO); }

        // >>> FIX AUDIO-VIBRACION - INICIO
        async function solicitarPermisosIniciales() {
            try {
                // 1. Notificaciones (para que suene en segundo plano en Android)
                if ("Notification" in window && Notification.permission === "default") {
                    await Notification.requestPermission();
                }
                // 2. Wake Lock (evita que se apague la pantalla)
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    wakeLock.addEventListener('release', () => { console.log('Wake Lock liberado'); });
                }
            } catch (err) { console.log('Permiso no concedido:', err.message); }
        }

        function solicitarWakeLock() { solicitarPermisosIniciales(); }

        function desbloquearAudioIOS() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                // Beep silencioso para desbloquear iPhone - OBLIGATORIO
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                gain.gain.setValueAtTime(0, audioCtx.currentTime); // volumen 0
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } catch(e) {}
        }

        function vibrarFuerte(patron) {
            try {
                if ("vibrate" in navigator) {
                    navigator.vibrate(patron);
                }
            } catch(e) {}
        }

        function sonarAlarma() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(987.77, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.9, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.8);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.8);

                // Segunda onda más grave para que se escuche más fuerte
                let osc2 = audioCtx.createOscillator();
                let gain2 = audioCtx.createGain();
                osc2.frequency.setValueAtTime(493.88, audioCtx.currentTime);
                gain2.gain.setValueAtTime(0.6, audioCtx.currentTime);
                osc2.connect(gain2);
                gain2.connect(audioCtx.destination);
                osc2.start();
                osc2.stop(audioCtx.currentTime + 0.5);

            } catch(e) { console.error(e); }
        }

        // Si vuelve de segundo plano, reanudar audio
        document.addEventListener('visibilitychange', async () => {
            if (document.visibilityState === 'visible') {
                if (audioCtx && audioCtx.state === 'suspended') await audioCtx.resume();
                if ('wakeLock' in navigator && wakeLock === null) {
                    try { wakeLock = await navigator.wakeLock.request('screen'); } catch(e){}
                }
            }
        });
        // >>> FIX AUDIO-VIBRACION - FIN

        signInAnonymously(auth).then(() => {
            let ticketBloqueado = verificarBloqueoInicial();
            if(!ticketBloqueado){
                document.getElementById("estado-pantalla").innerText = "Escribe tu número para comenzar...";
            } else {
                document.getElementById("numero-cliente-input").value = ticketBloqueado;
            }

            onValue(ref(db, 'don_roybert/contador_global'), (snap) => {
                const val = snap.val();
                const valor = (val && val.valor !== undefined) ? parseInt(val.valor) : 0;
                if(valor === 0){
                    liberarBloqueoTelefono();
                    if(localStorage.getItem(KEY_BLOQUEO) === null && ticketBloqueado){
                        location.reload();
                    }
                }
            });
            
            window.activarMiPedido = async (esReconexion = false) => {
                const inputVal = document.getElementById("numero-cliente-input").value;
                if(!inputVal) return alert("Por favor ingresa un número");

                if(!esReconexion){
                    const yaBloqueado = localStorage.getItem(KEY_BLOQUEO);
                    if(yaBloqueado){ alert("Ya tienes el pedido #" + yaBloqueado + " en curso."); return; }
                    activarBloqueoTelefono(inputVal);
                    ticketBloqueado = inputVal;
                }
                
                // >>> FIX AUDIO-VIBRACION - Todo el desbloqueo debe estar en el click
                desbloquearAudioIOS();
                await solicitarPermisosIniciales();
                vibrarFuerte(200); // vibración corta de confirmación
                
                document.getElementById("pantalla-registro").style.display = "none";
                document.getElementById("estado-pantalla").innerText = "Esperando pedido #" + inputVal + " (Sonido y vibración activos ✅)";
                
                const pedidoRef = ref(db, 'don_roybert/pedidos/' + inputVal);
                
                onValue(pedidoRef, (snapshot) => {
                    const data = snapshot.val();
                    if (data && data.estado === "ENTREGADO") {
                        document.getElementById("estado-pantalla").innerHTML = "<h3 style='color: #D52B1E;'>❌ Ticket ya utilizado.</h3><p>Espera RESET de cocina.</p>";
                        if(intervaloAlarma) clearInterval(intervaloAlarma);
                        off(pedidoRef);
                        return;
                    }
                    
                    if (data && data.estado === "LISTO") {
                        document.getElementById("estado-pantalla").innerHTML = "<h2>¡PEDIDO #" + inputVal + " LISTO!</h2><p>Pasa a retirar.</p>";
                        
                        const video = document.getElementById("video-cueca");
                        video.style.display = "block";
                        video.load();
                        video.play().catch(()=>{});

                        // >>> FIX AUDIO-VIBRACION - Asegurar que suene
                        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
                        sonarAlarma();
                        vibrarFuerte([1000, 500, 1000, 500, 1000]);
                        
                        intervaloAlarma = setInterval(() => {
                            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
                            sonarAlarma();
                            vibrarFuerte([800, 300, 800]);
                        }, 2000);

                        update(pedidoRef, { estado: "ENTREGADO" });
                        off(pedidoRef);

                        setTimeout(() => {
                            if(intervaloAlarma) clearInterval(intervaloAlarma);
                            if (wakeLock !== null) wakeLock.release().then(() => wakeLock = null);
                            document.getElementById("estado-pantalla").innerHTML = "<h3>Pedido Entregado.</h3><p>Gracias por su preferencia.<br>Quedarás bloqueado hasta RESET.</p>";
                            document.getElementById("video-cueca").style.display = "none";
                            document.getElementById("boton-cerrar").style.display = "inline-block";
                        }, 20000);
                    }
                });
            };
        });
    </script>
</body>
</html>
