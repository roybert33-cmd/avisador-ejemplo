<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cliente - Avisador</title>
    <link rel="stylesheet" href="diseno.css">
</head>
<body>
    <div class="contenedor" id="contenedor-principal">
        <h1>Retiro de Pedidos</h1>
        
        <div id="pantalla-registro">
            <input type="number" id="numero-cliente-input" placeholder="Tu número de ticket" style="padding:10px; width:80%; border-radius:5px; border:1px solid #ccc;">
            <button class="boton-accion" id="btn-activar">🔔 Activar Alertas</button>
            <p id="log-vibracion" style="font-size:11px; color:#888; margin-top:5px;"></p>
        </div>

        <div id="estado-pantalla" style="font-size: 20px; margin-top:20px;">Esperando conexión...</div>
        
        <button id="boton-cerrar" style="display:none; margin-top: 20px; padding: 15px 30px; background-color: #D52B1E; color: white; border: none; border-radius: 5px; font-size: 18px; cursor: pointer;">Cerrar Página</button>
        
        <video id="video-cueca" class="video-cueca" style="display:none;" loop playsinline preload="auto">
            <source src="video.mp4" type="video/mp4">
        </video>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getDatabase, ref, onValue, off, update } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
        import { initializeAppCheck, ReCaptchaV3Provider } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app-check.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB9kLWRc6t7_XNBhlC10a4jmtbCntxOEYo",
            authDomain: "avisador-arayapp.firebaseapp.com",
            databaseURL: "https://avisador-arayapp-default-rtdb.firebaseio.com",
            projectId: "avisador-arayapp",
            storageBucket: "avisador-arayapp.firebasestorage.app",
            messagingSenderId: "337997002279",
            appId: "1:337997002279:web:6dc307a6e474432e64c002"
        };

        const app = initializeApp(firebaseConfig);
        initializeAppCheck(app, {
            provider: new ReCaptchaV3Provider('6LcPPFEtAAAAAIVtKgVFo1jtAQWRESDHHnCjMKaE'),
            isTokenAutoRefreshEnabled: true
        });

        const db = getDatabase(app);
        const auth = getAuth(app);
        let audioCtx = null;
        let osc = null;
        let gainNode = null;
        let intervaloVibracion = null;
        let wakeLock = null;

        async function solicitarWakeLock() {
            try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
        }

        // 1. VERIFICAR SI VIBRA
        function verificarSiVibra() {
            const log = document.getElementById('log-vibracion');
            if (!('vibrate' in navigator)) {
                log.textContent = "❌ Este celular NO soporta vibración";
                console.log("VERIFICACIÓN VIBRACIÓN: NO SOPORTADA");
                return false;
            }
            // Prueba real
            const puedeVibrar = navigator.vibrate(10);
            if (!puedeVibrar) {
                log.textContent = "⚠️ Vibración bloqueada por el navegador";
                console.log("VERIFICACIÓN VIBRACIÓN: BLOQUEADA");
                return false;
            }
            log.textContent = "✅ Vibración verificada: OK";
            console.log("VERIFICACIÓN VIBRACIÓN: OK");
            navigator.vibrate(0); // detener prueba
            return true;
        }

        // 2. SONIDO CONSTANTE
        function iniciarSonidoConstante() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                if (osc) try { osc.stop(); } catch(e){}

                osc = audioCtx.createOscillator();
                gainNode = audioCtx.createGain();
                osc.type = 'square'; // constante y fuerte
                osc.frequency.value = 987.77;
                gainNode.gain.value = 0.5;
                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                osc.start();
                console.log("SONIDO CONSTANTE: INICIADO");
            } catch(e) { console.error(e); }
        }

        function detenerSonidoConstante() {
            if (gainNode) gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            setTimeout(() => { if (osc) try{ osc.stop(); }catch(e){} osc = null; }, 300);
            if (intervaloVibracion) clearInterval(intervaloVibracion);
            navigator.vibrate(0);
            console.log("SONIDO Y VIBRACIÓN DETENIDOS");
        }

        // 3. VERIFICAR BOTÓN CERRAR
        function verificarBotonCerrar() {
            const btn = document.getElementById('boton-cerrar');
            if (!btn) {
                console.error("VERIFICACIÓN BOTÓN CERRAR: ❌ NO EXISTE");
                return false;
            }
            console.log("VERIFICACIÓN BOTÓN CERRAR: ✅ EXISTE");
            if (btn.style.display === 'none') {
                console.log("Botón estaba oculto, mostrándolo...");
                btn.style.display = 'inline-block';
            }
            // Verificación extra: que sea clickeable
            if (typeof btn.onclick !== 'function' && !btn.getAttribute('onclick')) {
                 btn.onclick = () => {
                    detenerSonidoConstante();
                    window.location.href = 'about:blank';
                 };
            }
            console.log("VERIFICACIÓN BOTÓN CERRAR: Listo y funcional");
            return true;
        }

        signInAnonymously(auth).then(() => {
            document.getElementById("estado-pantalla").innerText = "Escribe tu número para comenzar...";
            
            document.getElementById('btn-activar').onclick = () => {
                verificarSiVibra(); // verifica al activar
                activarMiPedido();
            };

            window.activarMiPedido = () => {
                const inputVal = document.getElementById("numero-cliente-input").value;
                if(!inputVal) return alert("Por favor ingresa un número");
                
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                solicitarWakeLock();
                
                document.getElementById("pantalla-registro").style.display = "none";
                document.getElementById("estado-pantalla").innerText = "Esperando pedido #" + inputVal;
                
                const pedidoRef = ref(db, 'don_roybert/pedidos/' + inputVal);
                
                onValue(pedidoRef, (snapshot) => {
                    const data = snapshot.val();
                    if (data && data.estado === "ENTREGADO") {
                        document.getElementById("estado-pantalla").innerHTML = "<h3 style='color: #D52B1E;'>❌ Ticket ya utilizado.</h3>";
                        off(pedidoRef);
                        verificarBotonCerrar();
                        return;
                    }
                    
                    if (data && data.estado === "LISTO") {
                        document.getElementById("estado-pantalla").innerHTML = "<h2>¡PEDIDO #" + inputVal + " LISTO!</h2><p>Pasa a retirar.</p>";
                        
                        const video = document.getElementById("video-cueca");
                        video.style.display = "block";
                        video.load();
                        video.play().catch(()=>{});

                        // SONIDO CONSTANTE
                        iniciarSonidoConstante();

                        // VIBRACIÓN CONSTANTE VERIFICADA
                        if (verificarSiVibra()) {
                            navigator.vibrate([1000, 200, 1000]);
                            intervaloVibracion = setInterval(() => {
                                navigator.vibrate([1000, 200, 1000]);
                            }, 2500);
                        }

                        update(pedidoRef, { estado: "ENTREGADO" });
                        off(pedidoRef);

                        setTimeout(() => {
                            detenerSonidoConstante();
                            if (wakeLock !== null) wakeLock.release().then(() => wakeLock = null).catch(()=>{});
                            
                            document.getElementById("estado-pantalla").innerHTML = "<h3>Pedido Entregado.</h3><p>Gracias por su preferencia.</p>";
                            document.getElementById("video-cueca").style.display = "none";
                            
                            // VERIFICACIÓN FINAL DEL BOTÓN
                            verificarBotonCerrar();
                            document.getElementById("boton-cerrar").style.display = "inline-block";
                            document.getElementById("boton-cerrar").onclick = () => {
                                detenerSonidoConstante();
                                window.location.href = 'about:blank';
                            };
                        }, 20000);
                    }
                });
            };
        });
    </script>
</body>
</html>
