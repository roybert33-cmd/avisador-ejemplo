<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cliente - Avisador</title>
    <link rel="stylesheet" href="diseno.css">
</head>
<body>
    <div class="contenedor" id="contenedor-principal">
        <h1>Retiro de Pedidos</h1>
        
        <div id="pantalla-registro">
            <input type="number" id="numero-cliente-input" placeholder="Tu número de ticket" style="padding:10px; width:80%; border-radius:5px; border:1px solid #ccc;">
            <button class="boton-accion" onclick="activarMiPedido()">🔔 Activar Alertas</button>
        </div>

        <div id="estado-pantalla" style="font-size: 20px; margin-top:20px;">Esperando conexión...</div>
        
        <button id="boton-cerrar" style="display:none; margin-top: 20px; padding: 15px 30px; background-color: #D52B1E; color: white; border: none; border-radius: 5px; font-size: 18px; cursor: pointer;" onclick="window.location.href='about:blank'">Cerrar Página</button>
        
        <video id="video-cueca" class="video-cueca" style="display:none;" loop muted playsinline preload="auto">
            <source src="video.mp4" type="video/mp4">
        </video>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getDatabase, ref, onValue, off, update } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
        import { initializeAppCheck, ReCaptchaV3Provider } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app-check.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB9kLWRc6t7_XNBhlC10a4jmtbCntxOEYo",
            authDomain: "avisador-arayapp.firebaseapp.com",
            databaseURL: "https://avisador-arayapp-default-rtdb.firebaseio.com",
            projectId: "avisador-arayapp",
            storageBucket: "avisador-arayapp.firebasestorage.app",
            messagingSenderId: "337997002279",
            appId: "1:337997002279:web:6dc307a6e474432e64c002"
        };

        const app = initializeApp(firebaseConfig);
        
        initializeAppCheck(app, {
            provider: new ReCaptchaV3Provider('6LcPPFEtAAAAAIVtKgVFo1jtAQWRESDHHnCjMKaE'),
            isTokenAutoRefreshEnabled: true
        });

        const db = getDatabase(app);
        const auth = getAuth(app);
        let audioCtx = null;
        let intervaloAlarma = null;
        let wakeLock = null;

        // >>> NUEVA FUNCION BLOQUEO - INICIO (No toca nada existente)
        const KEY_BLOQUEO = 'arayapp_ticket_bloqueado';
        function verificarBloqueoInicial() {
            const ticketGuardado = localStorage.getItem(KEY_BLOQUEO);
            if(ticketGuardado){
                document.getElementById("pantalla-registro").style.display = "none";
                document.getElementById("estado-pantalla").innerHTML = "<h3 style='color: #D52B1E;'>⏳ Tu pedido #" + ticketGuardado + " ya está en curso.</h3><p>No puedes ingresar otro número hasta que cocina reinicie el sistema.</p><p style='font-size:14px; opacity:0.7;'>Si recargas la página seguirás bloqueado.</p>";
                return ticketGuardado;
            }
            return null;
        }
        function activarBloqueoTelefono(numero){
            localStorage.setItem(KEY_BLOQUEO, numero);
        }
        function liberarBloqueoTelefono(){
            localStorage.removeItem(KEY_BLOQUEO);
        }
        // >>> NUEVA FUNCION BLOQUEO - FIN

        async function solicitarWakeLock() {
            try {
                wakeLock = await navigator.wakeLock.request('screen');
            } catch (err) {
                console.log('Wake Lock no soportado: ' + err.message);
            }
        }

        function sonarAlarma() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(987.77, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.6, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.5);
            } catch(e) { console.error(e); }
        }

        signInAnonymously(auth).then(() => {
            // >>> NUEVA FUNCION BLOQUEO - Verificación al cargar
            let ticketBloqueado = verificarBloqueoInicial();
            if(!ticketBloqueado){
                document.getElementById("estado-pantalla").innerText = "Escribe tu número para comenzar...";
            } else {
                // Si ya estaba bloqueado, reconectar la escucha de su pedido existente
                document.getElementById("numero-cliente-input").value = ticketBloqueado;
                // Auto-reactivar la escucha sin pedir que vuelva a presionar el botón
                setTimeout(() => { if(window.activarMiPedido) window.activarMiPedido(true); }, 500);
            }

            // >>> NUEVA FUNCION BLOQUEO - Escuchar RESET de cocina para liberar
            onValue(ref(db, 'don_roybert/contador_global'), (snap) => {
                const val = snap.val();
                const valor = (val && val.valor !== undefined) ? parseInt(val.valor) : 0;
                if(valor === 0){
                    // Cocina reinició, liberar este teléfono
                    liberarBloqueoTelefono();
                    // Solo recargar si estaba bloqueado
                    if(localStorage.getItem(KEY_BLOQUEO) === null && ticketBloqueado){
                        location.reload();
                    }
                }
            });
            
            window.activarMiPedido = (esReconexion = false) => {
                const inputVal = document.getElementById("numero-cliente-input").value;
                if(!inputVal) return alert("Por favor ingresa un número");

                // >>> NUEVA FUNCION BLOQUEO - Impedir segundo ingreso
                if(!esReconexion){
                    const yaBloqueado = localStorage.getItem(KEY_BLOQUEO);
                    if(yaBloqueado){
                        alert("Ya tienes el pedido #" + yaBloqueado + " en curso. Debes esperar el RESET de cocina.");
                        return;
                    }
                    activarBloqueoTelefono(inputVal);
                    ticketBloqueado = inputVal;
                }
                
                if(!esReconexion){
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    solicitarWakeLock();
                }
                
                document.getElementById("pantalla-registro").style.display = "none";
                document.getElementById("estado-pantalla").innerText = "Esperando pedido #" + inputVal;
                
                const pedidoRef = ref(db, 'don_roybert/pedidos/' + inputVal);
                
                onValue(pedidoRef, (snapshot) => {
                    const data = snapshot.val();
                    if (data && data.estado === "ENTREGADO") {
                        document.getElementById("estado-pantalla").innerHTML = "<h3 style='color: #D52B1E;'>❌ Ticket ya utilizado.</h3><p>Espera que cocina reinicie el contador para pedir de nuevo.</p>";
                        if(intervaloAlarma) clearInterval(intervaloAlarma);
                        off(pedidoRef);
                        // >>> NUEVA FUNCION BLOQUEO - NO liberamos aquí, se mantiene bloqueado hasta reset de cocina
                        return;
                    }
                    
                    if (data && data.estado === "LISTO") {
                        document.getElementById("estado-pantalla").innerHTML = "<h2>¡PEDIDO #" + inputVal + " LISTO!</h2><p>Pasa a retirar.</p>";
                        
                        const video = document.getElementById("video-cueca");
                        video.style.display = "block";
                        video.load();
                        
                        let playPromise = video.play();
                        if (playPromise !== undefined) {
                            playPromise.catch(error => {
                                console.log("La reproducción falló:", error);
                            });
                        }
                        
                        sonarAlarma();
                        if (navigator.vibrate) navigator.vibrate([1000, 500, 1000]);
                        intervaloAlarma = setInterval(() => {
                            sonarAlarma();
                            if (navigator.vibrate) navigator.vibrate([400, 200, 400]);
                        }, 2000);

                        update(pedidoRef, { estado: "ENTREGADO" });
                        off(pedidoRef);

                        setTimeout(() => {
                            if(intervaloAlarma) clearInterval(intervaloAlarma);
                            if (wakeLock !== null) wakeLock.release().then(() => wakeLock = null);
                            
                            document.getElementById("contenedor-principal").style.pointerEvents = "auto";
                            document.getElementById("contenedor-principal").style.opacity = "1";
                            document.getElementById("estado-pantalla").innerHTML = "<h3>Pedido Entregado.</h3><p>Gracias por su preferencia.<br>Quedarás bloqueado hasta el próximo RESET de cocina.</p>";
                            document.getElementById("video-cueca").style.display = "none";
                            
                            document.getElementById("boton-cerrar").style.display = "inline-block";
                        }, 20000);
                    }
                });
            };
        });
    </script>
</body>
</html>
